name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual runs from the Actions tab

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish (Blazor WASM)
        run: dotnet publish PersonalPage.csproj -c Release -o release --nologo

      - name: Rewrite base href for the deploy target
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY#*/}"
          # A user/org page (user.github.io) and custom domains are served at
          # the root, so the base path is "/". A project page is served from a
          # sub-path, so the base path must be "/<repo>/".
          if [[ "$REPO" == *.github.io ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/$REPO/"
          fi
          echo "Deploy base path: $BASE_PATH"
          sed -i "s#<base href=\"/\" />#<base href=\"$BASE_PATH\" />#g" release/wwwroot/index.html
          sed -i "s#location.replace('/')#location.replace('$BASE_PATH')#g" release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
